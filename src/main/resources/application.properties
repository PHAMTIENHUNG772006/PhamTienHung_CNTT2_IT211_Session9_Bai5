spring.application.name=Session9_Bai1



#Config Datasource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/session9?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=admin123


#Config JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

#Config Logging
logging.file.name=log/all-logs.log
logging.pattern.console={"thoi_gian":"%d{yyyy-MM-dd HH:mm:ss.SSS}","muc_log":"%level","lop":"%logger{50}","ma_request":"%X{requestId}","noi_dung":"%msg"}
logging.lobsack.rollingpolicy.max-file-size=10MB
logging.lobsack.rollingpolicy.max-history=10
logging.level.root=INFO


